services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bank_scraper
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraper -d bank_scraper"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
