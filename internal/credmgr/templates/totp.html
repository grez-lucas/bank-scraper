{{define "totp.html"}}
<!DOCTYPE html>
<html lang="en">
<head><title>2FA - Aynitech Bank Scraper</title>{{template "head" .}}</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<main class="w-full max-w-sm px-4">
    <div class="text-center mb-8">
        <img src="/static/logo.png" alt="Aynitech Group" class="h-12 mx-auto mb-3">
        <h1 class="text-xl font-bold text-gray-800">Two-Factor Authentication</h1>
        <p class="text-sm text-gray-400 mt-1">Enter the 6-digit code from your authenticator app</p>
    </div>
    {{template "flash" .}}
    {{if .Error}}
    <div class="mb-4 p-3 rounded bg-red-50 text-red-700 border border-red-200 text-sm">{{.Error}}</div>
    {{end}}
    <form method="POST" action="/login/totp" class="space-y-4 bg-white shadow rounded-lg p-6">
        <input type="hidden" name="csrf_token" value="{{.CSRFToken}}">
        <input type="hidden" name="pending_token" value="{{.PendingToken}}">
        <div>
            <label for="code" class="block text-sm font-medium text-gray-700 mb-1">Code</label>
            <input type="text" id="code" name="code" required autofocus
                   inputmode="numeric" pattern="[0-9]{6}" maxlength="6" autocomplete="one-time-code"
                   class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-center text-2xl tracking-widest">
        </div>
        <button type="submit" class="w-full py-2 px-4 bg-blue-600 text-white rounded-md hover:bg-blue-700">Verify</button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500"><a href="/login" class="text-blue-600 hover:underline">Back to login</a></p>
</main>
</body>
</html>
{{end}}
